name: Daily Railway restart

on:
  schedule:
    - cron: "0 4 * * *"  # daily 04:00 UTC
    - cron: "0 16 * * *" # daily 16:00 UTC
  workflow_dispatch: {}

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Redeploy Railway service daily
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          set -euo pipefail
          echo "Railway redeploy triggered at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "Missing secret: RAILWAY_TOKEN"
            exit 1
          fi
          if [ -z "${RAILWAY_ENVIRONMENT_ID:-}" ]; then
            echo "Missing secret: RAILWAY_ENVIRONMENT_ID"
            exit 1
          fi
          if [ -z "${RAILWAY_SERVICE_ID:-}" ]; then
            echo "Missing secret: RAILWAY_SERVICE_ID"
            exit 1
          fi

          echo "Target environmentId=${RAILWAY_ENVIRONMENT_ID}"
          echo "Target serviceId=${RAILWAY_SERVICE_ID}"
          
          payload=$(printf '{"query":"mutation { serviceInstanceRedeploy(environmentId: \\"%s\\", serviceId: \\"%s\\") }"}' "${RAILWAY_ENVIRONMENT_ID}" "${RAILWAY_SERVICE_ID}")
          
          # Don't use -f so we can see GraphQL errors in the body.
          resp=$(curl -sS https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -d "${payload}" \
            -w "\nhttp_status=%{http_code}\n")
          
          echo "$resp"
          status=$(echo "$resp" | sed -n 's/^http_status=//p')
          if [ "${status:-}" != "200" ]; then
            echo "Railway API call failed (http ${status:-unknown})"
            exit 1
          fi

