name: Horizon CCU Collector

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call collector endpoint
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          JOB_SECRET: ${{ secrets.JOB_SECRET }}
        run: |
          set -euo pipefail
          echo "Calling ${API_BASE_URL}/jobs/ccuCollector/runOnce"
          curl -sS -X POST "${API_BASE_URL}/jobs/ccuCollector/runOnce" \
            -H "x-job-secret: ${JOB_SECRET}" \
            -H "content-type: application/json"

