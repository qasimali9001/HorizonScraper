# Railway/Nixpacks: Chromium needs system libraries (e.g. libglib) not present on slim Node images.
# This extends the default install phase so the built image can run Playwright.
[phases.install]
cmds = [
  "corepack enable",
  "pnpm install --frozen-lockfile",
  "cd apps/api && npx --yes playwright install --with-deps chromium"
]
